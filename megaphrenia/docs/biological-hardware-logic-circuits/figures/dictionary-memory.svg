</g> <!-- Refinement coordinates panel --> <g transform="translate(560,120)"> <rect x="0" y="0" width="280" height="160" rx="10" fill="#fff" stroke="#bbb"/> <text x="12" y="24" class="label">Refinement coordinates</text> <text x="12" y="48" class="sub">S4 = Spacking (geometry)</text> <text x="12" y="68" class="sub">S5 = Shydrophobic (energy)</text> <text x="12" y="92" class="sub">Capacity: N^5 addresses (3D base × 2D refinement)</text> <text x="12" y="116" class="sub">Hole-aware transformer: 22.3% attention on holes</text> </g> <!-- Write/Read flow --> <g transform="translate(120,430)"> <rect x="0" y="0" width="660" height="70" rx="10" fill="#fff" stroke="#bbb"/> <text x="12" y="24" class="label">Operations</text> <text x="12" y="50" class="sub">Write(Saddress, Data): configure holes → D[Saddress] ← Data</text> <text x="340" y="50" class="sub">Read(Squery): retrieve D[arg min ||S - Squery||]</text> </g> </svg>  