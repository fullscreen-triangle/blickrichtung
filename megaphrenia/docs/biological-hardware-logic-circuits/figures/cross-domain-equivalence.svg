<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
    <defs>
    <marker id="arrow7" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <polygon points="0,0 6,3 0,6" fill="#333"/>
    </marker>
    <style>
    .label{font-family:DejaVu Sans;font-size:12px;fill:#333}
    .sub{font-family:DejaVu Sans;font-size:11px;fill:#777}
    </style>
    </defs>
    <text x="450" y="26" text-anchor="middle" class="label" font-size="18">Cross-Domain I/O Equivalence</text>
    
    <!-- Central S-space hub --> <g transform="translate(450,260)"> <circle cx="0" cy="0" r="58" fill="#f7f7f7" stroke="#bbb"/> <text x="0" y="-4" text-anchor="middle" class="label">Unified S-space</text> <text x="0" y="16" text-anchor="middle" class="sub">∥SA − SB∥ &lt; ε</text> </g> <!-- Modality ring --> <g font-family="DejaVu Sans" font-size="12"> <!-- Acoustic --> <g transform="translate(450,90)"> <circle cx="0" cy="0" r="26" fill="#17becf" stroke="#333"/> <text x="0" y="4" text-anchor="middle" fill="#fff">Acoustic</text> <line x1="0" y1="26" x2="0" y2="134" stroke="#333" marker-end="url(#arrow7)"/> </g> <!-- Capacitive --> <g transform="translate(620,140)"> <circle cx="0" cy="0" r="26" fill="#2ca02c" stroke="#333"/> <text x="0" y="4" text-anchor="middle" fill="#fff">Capacitive</text> <line x1="-56" y1="-10" x2="-124" y2="60" stroke="#333" marker-end="url(#arrow7)"/> </g> <!-- Electromagnetic --> <g transform="translate(720,260)"> <circle cx="0" cy="0" r="26" fill="#1f77b4" stroke="#333"/> <text x="0" y="4" text-anchor="middle" fill="#fff">EM</text> <line x1="-60" y1="0" x2="-146" y2="0" stroke="#333" marker-end="url(#arrow7)"/> </g> <!-- Optical --> <g transform="translate(620,380)"> <circle cx="0" cy="0" r="26" fill="#ff7f0e" stroke="#333"/> <text x="0" y="4" text-anchor="middle" fill="#fff">Optical</text> <line x1="-56" y1="10" x2="-124" y2="-60" stroke="#333" marker-end="url(#arrow7)"/> </g> <!-- Thermal --> <g transform="translate(450,430)"> <circle cx="0" cy="0" r="26" fill="#d62728" stroke="#333"/> <text x="0" y="4" text-anchor="middle" fill="#fff">Thermal</text> <line x1="0" y1="-26" x2="0" y2="-134" stroke="#333" marker-end="url(#arrow7)"/> </g> <!-- Vibrational --> <g transform="translate(280,380)"> <circle cx="0" cy="0" r="26" fill="#9467bd" stroke="#333"/> <text x="0" y="4" text-anchor="middle" fill="#fff">Vibration</text> <line x1="56" y1="10" x2="124" y2="-60" stroke="#333" marker-end="url(#arrow7)"/> </g> <!-- Material --> <g transform="translate(180,260)"> <circle cx="0" cy="0" r="26" fill="#8c564b" stroke="#333"/> <text x="0" y="4" text-anchor="middle" fill="#fff">Material</text> <line x1="60" y1="0" x2="146" y2="0" stroke="#333" marker-end="url(#arrow7)"/> </g> </g> <!-- Example transmission inset --> <g transform="translate(120,100)"> <rect x="0" y="0" width="250" height="120" rx="10" fill="#fff" stroke="#bbb"/> <text x="12" y="24" class="label">Example path</text> <text x="12" y="48" class="sub">Transmit: Acoustic "10110"</text> <text x="12" y="68" class="sub">Receive: Capacitive (∥ΔS∥ = 0.05)</text> <text x="12" y="88" class="sub">Agreement: 0.92</text> </g> </svg>