<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-label="Phase-locked oxygen ensembles encoding environmental variables"> <defs> <style> .t { font-family: 'Helvetica, Arial, sans-serif'; fill: #111; } .title { font-size: 28px; font-weight: 600; } .label { font-size: 22px; font-weight: 600; } .small { font-size: 18px; } .cloud { fill: #E6EEF6; stroke: #8FA9C6; stroke-width: 2; } .o2 { fill: #2F7EBE; } .ring { fill: none; stroke: #2F7EBE; stroke-width: 2; opacity: 0.7; } .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arr); } .box { fill: #fff; stroke: #888; stroke-width: 2; } .badge { fill: #F0F4F8; stroke: #AEBECD; } .axis { stroke: #555; stroke-width: 2; } .grid { stroke: #ddd; stroke-width: 1; } .curve { fill: none; stroke: #2F7EBE; stroke-width: 3; } .peak { fill: none; stroke: #E45756; stroke-width: 2; } .vec { stroke: #54A24B; stroke-width: 3; } </style> <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"> <path d="M0,0 L8,3 L0,6 Z" fill="#333"/> </marker> </defs>
    <text x="600" y="40" text-anchor="middle" class="t title">Phase-Locked O₂ Ensembles Encode Environmental State</text>
    <text x="600" y="75" text-anchor="middle" class="t small">Coherent clusters (~10⁴ molecules, ξ≈10–20 nm) act as distributed sensors; phase features → T, P, chemistry, flow, viscosity, E, B</text>
    <!-- Left: formation of ensembles --> <g transform="translate(40,110)"> <text x="220" y="-15" class="t label">Formation of Phase-Locked Ensembles</text> <rect x="0" y="0" width="440" height="260" class="box"/>
        <!-- gas background -->
<rect x="10" y="10" width="420" height="240" class="cloud"/>

<!-- three ensembles -->
<g transform="translate(80,70)">
  <circle cx="0" cy="0" r="55" class="ring"/>
  <circle cx="0" cy="0" r="35" class="ring" stroke-dasharray="6,6"/>
  <!-- O2 dots -->
  <g>
    <circle cx="-20" cy="-10" r="4" class="o2"/>
    <circle cx="15" cy="-18" r="4" class="o2"/>
    <circle cx="30" cy="10" r="4" class="o2"/>
    <circle cx="-10" cy="25" r="4" class="o2"/>
    <circle cx="-35" cy="15" r="4" class="o2"/>
    <circle cx="5" cy="0" r="4" class="o2"/>
    <circle cx="22" cy="-35" r="4" class="o2"/>
    <circle cx="-30" cy="-28" r="4" class="o2"/>
  </g>
  <text x="0" y="80" text-anchor="middle" class="t small">ξ_coh</text>
</g>

<g transform="translate(210,120)">
  <circle cx="0" cy="0" r="45" class="ring"/>
  <circle cx="0" cy="0" r="30" class="ring" stroke-dasharray="6,6"/>
  <g>
    <circle cx="-15" cy="-8" r="4" class="o2"/>
    <circle cx="10" cy="-14" r="4" class="o2"/>
    <circle cx="22" cy="8" r="4" class="o2"/>
    <circle cx="-8" cy="18" r="4" class="o2"/>
    <circle cx="-28" cy="10" r="4" class="o2"/>
    <circle cx="4" cy="0" r="4" class="o2"/>
  </g>
</g>

<g transform="translate(340,90)">
  <circle cx="0" cy="0" r="50" class="ring"/>
  <circle cx="0" cy="0" r="33" class="ring" stroke-dasharray="6,6"/>
  <g>
    <circle cx="-18" cy="-8" r="4" class="o2"/>
    <circle cx="14" cy="-16" r="4" class="o2"/>
    <circle cx="28" cy="8" r="4" class="o2"/>
    <circle cx="-8" cy="22" r="4" class="o2"/>
    <circle cx="-30" cy="12" r="4" class="o2"/>
    <circle cx="4" cy="0" r="4" class="o2"/>
    <circle cx="18" cy="24" r="4" class="o2"/>
  </g>
</g>

<!-- annotation -->
<g transform="translate(10,220)">
  <rect x="0" y="-20" width="420" height="40" class="badge"/>
  <text x="210" y="7" text-anchor="middle" class="t small">N ≈ 10⁴ molecules/ensemble; ξ_coh ≈ √(D/Δω); lifetime τ ∝ exp(E_bind/kT)</text>
</g>
</g> <!-- Middle: phase features to variables --> <g transform="translate(480,110)"> <text x="240" y="-15" class="t label">Phase Features → Environmental Variables</text> <rect x="0" y="0" width="480" height="260" class="box"/>
    <!-- axes for phase vs time -->
<g transform="translate(40,40)">
    <text x="120" y="-10" class="t small">Phase φ(t)</text>
    <line x1="0" y1="120" x2="240" y2="120" class="axis"/>
    <line x1="0" y1="120" x2="0" y2="0" class="axis"/>
    <!-- grid -->
    <g class="grid">
      <line x1="40" y1="0" x2="40" y2="120"/>
      <line x1="80" y1="0" x2="80" y2="120"/>
      <line x1="120" y1="0" x2="120" y2="120"/>
      <line x1="160" y1="0" x2="160" y2="120"/>
      <line x1="200" y1="0" x2="200" y2="120"/>
      <line x1="0" y1="80" x2="240" y2="80"/>
      <line x1="0" y1="40" x2="240" y2="40"/>
    </g>
    <!-- phase curve (temperature affects damping) -->
    <path d="M0,80 C30,50 50,40 80,50 C110,60 130,85 160,90 C190,95 210,100 240,105" class="curve"/>
    <text x="120" y="140" text-anchor="middle" class="t small">φ drift and damping → T, η</text>
  </g>
  
  <!-- spectrum -->
  <g transform="translate(280,40)">
    <text x="100" y="-10" class="t small">Spectrum ϕ̃(ω)</text>
    <line x1="0" y1="120" x2="220" y2="120" class="axis"/>
    <line x1="0" y1="120" x2="0" y2="0" class="axis"/>
    <!-- peaks (Zeeman, species) -->
    <path d="M10,120 L10,90" class="peak"/>
    <path d="M40,120 L40,60" class="peak"/>
    <path d="M75,120 L75,80" class="peak"/>
    <path d="M130,120 L130,45" class="peak"/>
    <path d="M180,120 L180,70" class="peak"/>
    <text x="130" y="140" text-anchor="middle" class="t small">peaks → composition, B-field</text>
  </g>
  
  <!-- variable mapping bullets -->
  <g transform="translate(20,210)">
    <text class="t small">Mappings:</text>
    <text y="25" class="t small">• τ_coh(T) → Temperature</text>
    <text y="50" class="t small">• n_ens, size → Pressure</text>
    <text y="75" class="t small">• ϕ̃(ω) peaks → Chemistry, B</text>
    <text x="250" y="25" class="t small">• ∇φ → Flow/velocity</text>
    <text x="250" y="50" class="t small">• γ_decay → Viscosity</text>
    <text x="250" y="75" class="t small">• Anisotropy → E-field</text>
  </g>
</g> <!-- Bottom: Transitive coupling --> <g transform="translate(40,410)"> <text x="560" y="-15" class="t label">Transitive Coupling: Membrane ↔ O₂ ↔ Surface</text> <rect x="0" y="0" width="1120" height="320" class="box"/>
    <!-- Surface nodes -->
<g transform="translate(60,40)">
    <rect x="0" y="0" width="200" height="100" class="badge"/>
    <text x="100" y="30" text-anchor="middle" class="t small">Optical Surface</text>
    <text x="100" y="60" text-anchor="middle" class="t small">n(T,P), light phase</text>
  </g>
  <g transform="translate(60,170)">
    <rect x="0" y="0" width="200" height="100" class="badge"/>
    <text x="100" y="30" text-anchor="middle" class="t small">Acoustic Wall</text>
    <text x="100" y="60" text-anchor="middle" class="t small">Echo phase, v_sound(T)</text>
  </g>
  <g transform="translate(860,105)">
    <rect x="0" y="0" width="200" height="100" class="badge"/>
    <text x="100" y="30" text-anchor="middle" class="t small">Biological Film</text>
    <text x="100" y="60" text-anchor="middle" class="t small">Metabolic oscillations</text>
  </g>
  
  <!-- O2 mediator -->
  <g transform="translate(470,120)">
    <circle cx="90" cy="40" r="55" class="ring"/>
    <g>
      <circle cx="60" cy="25" r="4" class="o2"/>
      <circle cx="100" cy="15" r="4" class="o2"/>
      <circle cx="120" cy="45" r="4" class="o2"/>
      <circle cx="80" cy="65" r="4" class="o2"/>
      <circle cx="55" cy="55" r="4" class="o2"/>
      <circle cx="95" cy="45" r="4" class="o2"/>
    </g>
    <text x="90" y="110" text-anchor="middle" class="t small">O₂ ensemble</text>
  </g>
  
  <!-- Membrane -->
  <g transform="translate(480,260)">
    <rect x="-100" y="0" width="500" height="12" fill="#7A5195" opacity="0.85"/>
    <text x="150" y="40" text-anchor="middle" class="t small">Membrane interface (vFRET + paramagnetic coupling)</text>
  </g>
  
  <!-- arrows -->
  <line x1="260" y1="90" x2="530" y2="150" class="arrow"/>
  <line x1="260" y1="240" x2="530" y2="160" class="arrow"/>
  <line x1="760" y1="155" x2="560" y2="155" class="arrow"/>
  <line x1="560" y1="210" x2="560" y2="260" class="arrow"/>
  
  <!-- summary -->
  <g transform="translate(360,20)">
    <rect x="0" y="0" width="400" height="60" class="badge"/>
    <text x="200" y="25" text-anchor="middle" class="t small">Transitivity: If |φ_A − φ_B| &lt; π/4 and |φ_B − φ_C| &lt; π/4</text>
    <text x="200" y="48" text-anchor="middle" class="t small">then A ↔ C effectively phase-locked (environmental computing accessible)</text>
  </g>
</g> </svg>