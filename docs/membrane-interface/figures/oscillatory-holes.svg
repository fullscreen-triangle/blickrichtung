<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-label="Membrane–O2 resonance coupling and oscillatory holes"> <defs> <style> .t { font-family: 'Helvetica, Arial, sans-serif'; fill: #111; } .title { font-size: 28px; font-weight: 600; } .label { font-size: 22px; font-weight: 600; } .small { font-size: 18px; } .panel { fill: #fff; stroke: #999; stroke-width: 2; } .mem { fill: #7A5195; opacity: 0.9; } .lipid { fill: #B28DCD; opacity: 0.85; } .o2 { fill: #2F7EBE; } .drug { fill: #54A24B; } .hole { fill: none; stroke: #E45756; stroke-width: 3; stroke-dasharray: 6,4; } .vib { stroke: #2F7EBE; stroke-width: 2; fill: none; } .spin { stroke: #EAC11A; stroke-width: 2; } .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arr); } .badge { fill: #F6F7FB; stroke: #C8CEDA; } .tick { stroke: #666; stroke-width: 1.5; } .axis { stroke: #333; stroke-width: 2; } </style> <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"> <path d="M0,0 L8,3 L0,6 Z" fill="#333"/> </marker> </defs>
    <text x="600" y="40" text-anchor="middle" class="t title">Membrane–O₂ Resonance Coupling and Oscillatory Holes (P–N Channel)</text>
    <text x="600" y="75" text-anchor="middle" class="t small">vFRET + spin coupling transfer O₂ state to membrane; holes encode P-type, molecules encode N-type; cardiac phases gate bidirectional flow</text>
    
    <!-- Panel 1: Coupling --> <g transform="translate(40,110)"> <text x="260" y="-15" class="t label">1. Resonance Coupling</text> <rect x="0" y="0" width="520" height="280" class="panel"/> <!-- membrane --> <rect x="40" y="200" width="440" height="16" class="mem"/> <!-- lipids --> <g transform="translate(60,195)"> <rect x="0" y="0" width="40" height="25" class="lipid"/> <rect x="55" y="0" width="40" height="25" class="lipid"/> <rect x="110" y="0" width="40" height="25" class="lipid"/> <rect x="165" y="0" width="40" height="25" class="lipid"/> <rect x="220" y="0" width="40" height="25" class="lipid"/> <rect x="275" y="0" width="40" height="25" class="lipid"/> <rect x="330" y="0" width="40" height="25" class="lipid"/> </g> <!-- O2 --> <g transform="translate(120,120)"> <circle cx="0" cy="0" r="10" class="o2"/> <path d="M-20,0 C-5,-10 5,-10 20,0" class="vib"/> <text x="0" y="-18" text-anchor="middle" class="t small">O₂ (ν,J,m_S)</text> </g> <!-- vFRET arrow --> <line x1="120" y1="120" x2="140" y2="190" class="arrow"/> <text x="130" y="160" text-anchor="middle" class="t small">vFRET</text> <!-- spin coupling --> <g transform="translate(300,120)"> <circle cx="0" cy="0" r="10" class="o2"/> <path d="M0,-18 L0,18" class="spin"/> <text x="0" y="-25" text-anchor="middle" class="t small">spin</text> </g> <line x1="300" y1="120" x2="330" y2="190" class="arrow"/> <text x="315" y="160" text-anchor="middle" class="t small">magnetic</text>
<!-- note -->
<g transform="translate(20,235)">
    <rect x="0" y="0" width="480" height="40" class="badge"/>
    <text x="240" y="25" text-anchor="middle" class="t small">Energy/time matching enables state transfer: O₂ → lipid vibrational/ spin states</text>
  </g>
</g> <!-- Panel 2: Oscillatory holes --> <g transform="translate(600,110)"> <text x="260" y="-15" class="t label">2) Oscillatory Holes (P-type)</text> <rect x="0" y="0" width="520" height="280" class="panel"/>
    <!-- membrane baseline -->
<rect x="40" y="200" width="440" height="16" class="mem"/>
<!-- resonance sites -->
<g transform="translate(60,195)">
  <rect x="0" y="0" width="40" height="25" class="lipid"/>
  <rect x="55" y="0" width="40" height="25" class="lipid"/>
  <rect x="110" y="0" width="40" height="25" class="lipid"/>
  <rect x="165" y="0" width="40" height="25" class="lipid"/>
  <rect x="220" y="0" width="40" height="25" class="lipid"/>
  <rect x="275" y="0" width="40" height="25" class="lipid"/>
  <rect x="330" y="0" width="40" height="25" class="lipid"/>
</g>

<!-- holes (missing oscillations) -->
<circle cx="95" cy="190" r="24" class="hole"/>
<circle cx="205" cy="185" r="20" class="hole"/>
<circle cx="370" cy="188" r="22" class="hole"/>

<text x="260" y="245" text-anchor="middle" class="t small">Hole pattern encodes categorical state (P-type, absence)</text>
</g> <!-- Panel 3: P–N junction and bidirectionality --> <g transform="translate(40,420)"> <text x="560" y="-15" class="t label">3) P–N Information Channel and Cardiac Gating</text> <rect x="0" y="0" width="1120" height="360" class="panel"/>
    <!-- left: N-type carriers -->
<g transform="translate(20,40)">
    <rect x="0" y="0" width="320" height="120" class="badge"/>
    <text x="160" y="25" text-anchor="middle" class="t small">N-type molecular carriers</text>
    <g transform="translate(30,55)">
      <circle cx="0" cy="0" r="10" class="o2"/><text x="20" y="5" class="t small">O₂</text>
    </g>
    <g transform="translate(110,55)">
      <rect x="-10" y="-10" width="20" height="20" class="drug" rx="3"/>
      <text x="20" y="5" class="t small">Drug</text>
    </g>
    <g transform="translate(200,55)">
      <circle cx="0" cy="0" r="10" class="drug"/><text x="20" y="5" class="t small">Metabolite</text>
    </g>
  </g>
  
  <!-- center: junction -->
  <g transform="translate(380,40)">
    <rect x="0" y="0" width="360" height="120" class="badge"/>
    <text x="180" y="25" text-anchor="middle" class="t small">Biological P–N Junction (Membrane)</text>
    <!-- P-N halves -->
    <rect x="20" y="50" width="150" height="40" fill="none" stroke="#E45756" stroke-width="3"/>
    <rect x="190" y="50" width="150" height="40" fill="none" stroke="#2F7EBE" stroke-width="3"/>
    <text x="95" y="80" text-anchor="middle" class="t small" fill="#E45756">P-type (holes)</text>
    <text x="265" y="80" text-anchor="middle" class="t small" fill="#2F7EBE">N-type (molecules)</text>
    <!-- built-in potential -->
    <text x="180" y="110" text-anchor="middle" class="t small">V_bi ≈ 615 mV, Rectification ≈ 42:1</text>
  </g>
  
  <!-- right: cardiac gating and bidirection -->
  <g transform="translate(770,40)">
    <rect x="0" y="0" width="330" height="120" class="badge"/>
    <text x="165" y="25" text-anchor="middle" class="t small">Cardiac Gating and Closed-Loop</text>
    <!-- heart icon -->
    <path d="M60,55 c-12,-20 18,-35 25,-15 c7,-20 37,-5 25,15 c-10,17 -25,26 -25,26 c0,0 -15,-9 -25,-26 z" fill="#E45756" opacity="0.8"/>
    <text x="60" y="100" text-anchor="middle" class="t small">Systole</text>
    <text x="160" y="100" text-anchor="middle" class="t small">→ O₂ pulse → Read</text>
    <text x="265" y="100" text-anchor="middle" class="t small">Diastole → Holes → Brain</text>
  </g>
  
  <!-- arrows between blocks -->
  <line x1="340" y1="100" x2="380" y2="100" class="arrow"/>
  <line x1="740" y1="100" x2="770" y2="100" class="arrow"/>
  
  <!-- bottom: forward and reverse paths -->
  <g transform="translate(20,200)">
    <rect x="0" y="0" width="1080" height="130" class="badge"/>
    <text x="540" y="25" text-anchor="middle" class="t small">Closed-Loop Information Flow</text>
  
    <!-- forward -->
    <text x="20" y="60" class="t small">Forward:</text>
    <text x="120" y="60" class="t small">O₂ state → membrane coupling → holes → nerves → brain (BMD fill)</text>
    <line x1="15" y1="75" x2="1060" y2="75" class="arrow"/>
  
    <!-- reverse -->
    <text x="20" y="100" class="t small">Reverse:</text>
    <text x="120" y="100" class="t small">Brain query → oscillatory intent → membrane test → hole response → confirmation</text>
    <line x1="1060" y1="105" x2="15" y2="105" class="arrow"/>
  </g>
</g> </svg>